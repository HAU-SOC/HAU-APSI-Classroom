<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
  
  <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
</head>
<body class="min-h-screen w-full" style="background: rgb(249, 250, 251);">
  
  <header class="bg-white shadow-sm py-3 px-6 flex items-center gap-4">
    <img class="h-14 w-auto" loading="lazy" src="{{ '/assets/img/logo.png' | relative_url }}" alt="HAU logo">
    <div>
      <h1 class="text-xl font-bold" style="color: rgb(107, 29, 46); font-weight: 700;">HAU APSI Classroom</h1>
    </div>
  </header>
  
  <main>
    {{ content }}
  </main>
  
  <footer class="text-center py-6 px-6" style="background: rgb(107, 29, 46);">
    <p class="text-sm" style="color: rgb(255, 255, 255);">© 2026 Holy Angel University — School of Computing</p>
  </footer>
  
</body>
</html>
