<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> School of Computing</title>
  
  <!-- Fonts and External Libraries -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
  
  <!-- Custom JS -->
  <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
  
  <!-- CDNs -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
</head>
<body class="min-h-screen w-full flex flex-col" style="background: rgb(249, 250, 251);">
  
  <!-- Header (Stays at the very top) -->
  <header class="bg-white shadow-sm py-3 px-6 flex items-center gap-4 z-20 relative">
    <img class="h-14 w-auto" loading="lazy" src="https://www.hau.edu.ph/images/logo.png" alt="HAU logo">
    <div>
      <h1 class="text-xl font-bold" style="color: rgb(107, 29, 46); font-weight: 700;">HAU APSI Classroom</h1>
    </div>
  </header>
  
  <!-- Main Layout Wrapper (Holds Sidebar and Content) -->
  <div class="flex flex-1 flex-col md:flex-row">
    
    <!-- Sidebar Navigation -->
    <aside class="w-full md:w-64 bg-white shadow-md md:sticky md:top-0 h-auto md:h-[calc(100vh-80px)] overflow-y-auto p-6 z-10">
      <h2 class="text-lg font-bold mb-6" style="color: rgb(107, 29, 46);">Course Module</h2>
      <nav class="flex flex-col gap-4">
        <a href="{{ 'lesson/module1' | relative_url }}" class="flex items-center gap-3 text-gray-700 hover:text-maroon font-medium transition">
          <i data-lucide="link" class="w-4 h-4"></i> Module 1: React Basics
        </a>
        <a href="#announcements" class="flex items-center gap-3 text-gray-700 hover:text-maroon font-medium transition">
          <i data-lucide="megaphone" class="w-4 h-4"></i> Module 2
        </a>
        <a href="#resources" class="flex items-center gap-3 text-gray-700 hover:text-maroon font-medium transition">
          <i data-lucide="folder" class="w-4 h-4"></i> Module 3
        </a>
        <a href="#activities" class="flex items-center gap-3 text-gray-700 hover:text-maroon font-medium transition">
          <i data-lucide="check-square" class="w-4 h-4"></i> Module 4
        </a>
        <a href="#contact" class="flex items-center gap-3 text-gray-700 hover:text-maroon font-medium transition">
          <i data-lucide="mail" class="w-4 h-4"></i> Module 5
        </a>
        <details class="group">
        <summary class="flex items-center justify-between cursor-pointer list-none text-gray-700 hover:text-maroon font-medium transition">
          <div class="flex items-center gap-3">
            <i data-lucide="megaphone" class="w-4 h-4"></i> Module 2
          </div>
          <i data-lucide="chevron-down" class="w-4 h-4 transition-transform group-open:rotate-180"></i>
        </summary>
        
        <div class="mt-3 pl-7 flex flex-col gap-3">
          <a href="#module-2-1" class="text-sm text-gray-600 hover:text-maroon font-medium transition flex items-center gap-2">
            <i data-lucide="corner-down-right" class="w-3 h-3"></i> Module 2.1
          </a>
          <a href="#module-2-2" class="text-sm text-gray-600 hover:text-maroon font-medium transition flex items-center gap-2">
            <i data-lucide="corner-down-right" class="w-3 h-3"></i> Module 2.2
          </a>
  </div>
</details>
      </nav>
    </aside>

    <!-- Page Content Injected Here -->
    <main class="flex-1 w-full">
      {{ content }}
    </main>

  </div>
  
  <!-- Footer -->
  <footer class="text-center py-6 px-6" style="background: rgb(107, 29, 46);">
    <p class="text-sm" style="color: rgb(255, 255, 255);">© 2026 Holy Angel University — School of Computing</p>
  </footer>
  
</body>
</html>
